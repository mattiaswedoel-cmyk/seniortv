<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min TV-Meny</title>
    <style>
        /* Bakgrund och layout */
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 { 
            margin-bottom: 40px; 
            font-weight: 300; 
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaaaaa;
        }

        /* Meny-behållare */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px;
            width: 85%;
            max-width: 900px;
        }

        /* Knapparnas utseende */
        .menu-item {
            background-color: #1f1f1f;
            color: white;
            text-decoration: none;
            padding: 40px 20px;
            text-align: center;
            border-radius: 20px;
            font-size: 1.8rem;
            border: 4px solid transparent;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Fokus-effekt (för både mus och fjärrkontroll) */
        .menu-item:focus, .menu-item:hover {
            background-color: #2a2a2a;
            border-color: #4285f4; 
            transform: scale(1.08);
            outline: none;
            box-shadow: 0 0 30px rgba(66, 133, 244, 0.4);
        }

        .icon { 
            font-size: 3rem; 
            display: block; 
            margin-bottom: 15px; 
        }

        /* Gömmer scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <h1>Mina Genvägar</h1>

    <div class="menu-container">
        <a href="https://www.svtplay.se/kanaler/svt1?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 1
        </a>
        <a href="https://www.svtplay.se/kanaler/svt2?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 2
        </a>
        <a href="https://www.svtplay.se/hundra-procent-bonde" class="menu-item">
            <span class="icon">👨‍🌾</span> 100% Bonde
        </a>
        <a href="https://www.svt.se/nyheter/" class="menu-item">
            <span class="icon">📰</span> SVT Nyheter
        </a>
    </div>

    <script>
        // Sätter fokus på första knappen direkt
        window.onload = () => {
            const firstButton = document.querySelector('.menu-item');
            if (firstButton) firstButton.focus();
        };
    </script>

</body>
</html>
