<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Meny</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            cursor: crosshair; /* Gör pekaren tydligare */
        }

        #clock { font-size: 4rem; margin-bottom: 20px; }

        .menu-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }

        .menu-item {
            background-color: #222;
            color: #fff;
            text-decoration: none;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            font-size: 1.5rem;
            border: 6px solid #444; 
            transition: all 0.1s;
            outline: none;
            display: block;
            position: relative;
        }

        /* Denna kod triggar på ALLA sätt en TV kan tänkas känna av en pekare */
        .menu-item:hover, 
        .menu-item:focus,
        .menu-item:active {
            background-color: #fff !important; /* Vit bakgrund för max synlighet */
            color: #000 !important; /* Svart text */
            border-color: #00ff00 !important; /* GRÖN RAM för att se om detta funkar */
            transform: scale(1.1);
            box-shadow: 0 0 50px #fff;
            z-index: 100;
        }

        .menu-item:last-child:nth-child(odd) { grid-column: span 2; }
        .icon { font-size: 2.5rem; display: block; pointer-events: none; }
    </style>
</head>
<body>

    <div id="clock">00:00</div>

    <div class="menu-container">
        <a href="https://www.svtplay.se/kanaler/svt1?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 1
        </a>
        <a href="https://www.svtplay.se/kanaler/svt2?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 2
        </a>
        <a href="https://www.svtplay.se/hundra-procent-bonde" class="menu-item">
            <span class="icon">👨‍🌾</span> 100% Bonde
        </a>
        <a href="https://www.svt.se/nyheter/" class="menu-item">
            <span class="icon">📰</span> SVT Nyheter
        </a>
        <a href="https://www.svtplay.se/kanaler/kunskapskanalen?start=auto" class="menu-item">
            <span class="icon">🎓</span> Kunskapskanalen
        </a>
    </div>

    <script>
        function update() {
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
        }
        setInterval(update, 1000);
        update();

        // Tvinga fokus på det pekaren nuddar - med en "try-catch" för att inte krascha
        document.addEventListener('mousemove', function(e) {
            var el = document.elementFromPoint(e.clientX, e.clientY);
            if (el && el.classList.contains('menu-item')) {
                el.focus();
            }
        });
    </script>
</body>
</html>
