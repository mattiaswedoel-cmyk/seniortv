<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Meny</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #clock { font-size: 4rem; margin-bottom: 20px; }

        .menu-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }

        .menu-item {
            background-color: #222;
            color: #fff;
            text-decoration: none;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            font-size: 1.5rem;
            /* Grundramen är mörk så den inte syns */
            border: 6px solid #222; 
            transition: all 0.1s;
            outline: none;
        }

        /* HÄR ÄR DEN TYDLIGA MARKERINGEN */
        .menu-item:hover, 
        .menu-item:focus,
        .active-tv {
            background-color: #444 !important;
            border-color: #ffcc00 !important; /* STARK GUL RAM */
            transform: scale(1.1) !important;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.6) !important;
        }

        .menu-item:last-child:nth-child(odd) { grid-column: span 2; }
        .icon { font-size: 2.5rem; display: block; }
    </style>
</head>
<body>

    <div id="clock">00:00</div>

    <div class="menu-container">
        <a href="https://www.svtplay.se/kanaler/svt1?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 1
        </a>
        <a href="https://www.svtplay.se/kanaler/svt2?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 2
        </a>
        <a href="https://www.svtplay.se/hundra-procent-bonde" class="menu-item">
            <span class="icon">👨‍🌾</span> 100% Bonde
        </a>
        <a href="https://www.svt.se/nyheter/" class="menu-item">
            <span class="icon">📰</span> SVT Nyheter
        </a>
        <a href="https://www.svtplay.se/kanaler/kunskapskanalen?start=auto" class="menu-item">
            <span class="icon">🎓</span> Kunskapskanalen
        </a>
    </div>

    <script>
        // Klocka
        function update() {
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
        }
        setInterval(update, 1000);
        update();

        // Tvinga highlight när man rör musen (för TV-apparater som är sega)
        const items = document.querySelectorAll('.menu-item');
        items.forEach(item => {
            item.addEventListener('mouseenter', () => item.focus());
        });

        window.onload = () => items[0].focus();
    </script>
</body>
</html>
