<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min TV-Meny</title>
    <style>
        body {
            background-color: #000000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #clock-container { text-align: center; margin-bottom: 20px; }
        #clock { font-size: 4rem; font-weight: 200; margin: 0; }
        #date { font-size: 1.2rem; color: #888; text-transform: capitalize; }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
            width: 90%;
            max-width: 800px;
        }

        .menu-item {
            background-color: #1a1a1a;
            color: #888888;
            text-decoration: none;
            padding: 25px 10px;
            text-align: center;
            border-radius: 15px;
            font-size: 1.3rem;
            border: 4px solid transparent; 
            transition: all 0.15s ease-in-out;
            outline: none; /* Tar bort webbläsarens egen fula ram */
            display: block;
        }

        /* HÄR ÄR HIGHLIGHTEN:
           Gäller både när du håller musen över (hover) 
           OCH när du stegar med fjärrkontrollen (focus)
        */
        .menu-item:hover, 
        .menu-item:focus {
            background-color: #333333 !important;
            color: #ffffff !important;
            border-color: #ffffff !important; /* Vit ram runt den valda rutan */
            transform: scale(1.1) !important; /* Rutan blir större */
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4) !important; /* Ljusglöd */
            cursor: pointer;
        }

        .menu-item:last-child:nth-child(odd) { grid-column: span 2; }
        .icon { font-size: 2.5rem; display: block; margin-bottom: 5px; }

    </style>
</head>
<body>

    <div id="clock-container">
        <div id="clock">00:00</div>
        <div id="date">Laddar...</div>
    </div>

    <div class="menu-container">
        <a href="https://www.svtplay.se/kanaler/svt1?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 1
        </a>
        <a href="https://www.svtplay.se/kanaler/svt2?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 2
        </a>
        <a href="https://www.svtplay.se/hundra-procent-bonde" class="menu-item">
            <span class="icon">👨‍🌾</span> 100% Bonde
        </a>
        <a href="https://www.svt.se/nyheter/" class="menu-item">
            <span class="icon">📰</span> SVT Nyheter
        </a>
        <a href="https://www.svtplay.se/kanaler/kunskapskanalen?start=auto" class="menu-item">
            <span class="icon">🎓</span> Kunskapskanalen
        </a>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ":" + m;
            const opt = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('sv-SE', opt);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Viktigt: Sätter fokus på första knappen direkt så TV:n vet var den är
        window.onload = () => { 
            const first = document.querySelector('.menu-item');
            if(first) first.focus(); 
        };
    </script>
</body>
</html>
