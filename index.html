<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min TV-Meny</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
            /* GÖR PEKAREN TILL ETT STORT KORS FÖR BÄTTRE SYNLIGHET */
            cursor: crosshair;
        }

        #clock-container {
            text-align: center;
            margin-bottom: 20px;
        }

        #clock {
            font-size: 4rem;
            font-weight: 200;
            margin: 0;
            line-height: 1;
        }

        #date {
            font-size: 1.2rem;
            color: #888;
            margin-top: 5px;
            text-transform: capitalize;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
            width: 95%;
            max-width: 850px;
        }

        .menu-item {
            background-color: #1f1f1f;
            color: white;
            text-decoration: none;
            padding: 25px 15px;
            text-align: center;
            border-radius: 15px;
            font-size: 1.3rem;
            border: none;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            outline: none;
            /* SÄKERSTÄLLER ATT PEKAREN SYNS SOM EN HAND ÖVER KNAPPARNA */
            cursor: pointer;
        }

        .menu-item:focus, .menu-item:hover {
            background-color: #2a2a2a;
        }

        .menu-item:last-child:nth-child(odd) {
            grid-column: span 2;
        }

        .icon { 
            font-size: 2rem; 
            display: block; 
            margin-bottom: 8px; 
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="clock-container">
        <div id="clock">00:00</div>
        <div id="date">Laddar...</div>
    </div>

    <div class="menu-container">
        <a href="https://www.svtplay.se/kanaler/svt1?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 1
        </a>
        <a href="https://www.svtplay.se/kanaler/svt2?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 2
        </a>
        <a href="https://www.svtplay.se/hundra-procent-bonde" class="menu-item">
            <span class="icon">👨‍🌾</span> 100% Bonde
        </a>
        <a href="https://www.svt.se/nyheter/" class="menu-item">
            <span class="icon">📰</span> SVT Nyheter
        </a>
        <a href="https://www.svtplay.se/kanaler/kunskapskanalen?start=auto" class="menu-item">
            <span class="icon">🎓</span> Kunskapskanalen
        </a>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('sv-SE', options);
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
