<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min TV-Meny</title>
    <style>
        /* Bakgrund och layout */
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Klockan */
        #clock-container {
            text-align: center;
            margin-bottom: 30px;
        }

        #clock {
            font-size: 5rem;
            font-weight: 200;
            margin: 0;
            line-height: 1;
        }

        #date {
            font-size: 1.5rem;
            color: #888;
            margin-top: 5px;
            text-transform: capitalize;
        }

        /* Meny-behållare */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px;
            width: 90%;
            max-width: 900px;
        }

        /* Knapparnas utseende */
        .menu-item {
            background-color: #1f1f1f;
            color: white;
            text-decoration: none;
            padding: 35px 20px;
            text-align: center;
            border-radius: 20px;
            font-size: 1.6rem;
            border: 4px solid transparent;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Om det är ett udda antal knappar blir den sista knappen bredare */
        .menu-item:last-child:nth-child(odd) {
            grid-column: span 2;
        }

        /* Fokus-effekt */
        .menu-item:focus, .menu-item:hover {
            background-color: #2a2a2a;
            border-color: #4285f4; 
            transform: scale(1.05);
            outline: none;
            box-shadow: 0 0 30px rgba(66, 133, 244, 0.4);
        }

        .icon { 
            font-size: 2.5rem; 
            display: block; 
            margin-bottom: 10px; 
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="clock-container">
        <div id="clock">00:00</div>
        <div id="date">Måndag 1 Januari</div>
    </div>

    <div class="menu-container">
        <a href="https://www.svtplay.se/kanaler/svt1?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 1
        </a>
        <a href="https://www.svtplay.se/kanaler/svt2?start=auto" class="menu-item">
            <span class="icon">📺</span> SVT 2
        </a>
        <a href="https://www.svtplay.se/hundra-procent-bonde" class="menu-item">
            <span class="icon">👨‍🌾</span> 100% Bonde
        </a>
        <a href="https://www.svt.se/nyheter/" class="menu-item">
            <span class="icon">📰</span> SVT Nyheter
        </a>
        <a href="https://www.svtplay.se/kanaler/kunskapskanalen?start=auto" class="menu-item">
            <span class="icon">🎓</span> Kunskapskanalen
        </a>
    </div>

    <script>
        // Funktion för klockan
        function updateClock() {
            const now = new Date();
            
            // Tid
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            
            // Datum
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('sv-SE', options);
        }

        // Starta klockan och uppdatera varje sekund
        setInterval(updateClock, 1000);
        updateClock();

        // Sätter fokus på första knappen direkt
        window.onload = () => {
            const firstButton = document.querySelector('.menu-item');
            if (firstButton) firstButton.focus();
        };
    </script>

</body>
</html>
